<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ლუკაის კინო </title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.4);
            --bg: #050507;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --accent: #00f2ff;
            --sidebar-width: 380px;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans Georgian', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Ambient background remains consistent with your original style */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 60, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
            z-index: -1;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        .logo-area {
            padding: 50px 30px;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff 20%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .ep-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 40px 20px;
        }

        .ep-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ep-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(10px);
        }

        .ep-card.active {
            background: rgba(255, 0, 60, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .ep-num { 
            font-family: monospace;
            color: var(--accent);
            font-weight: bold;
        }

        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            overflow-y: auto;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        video, iframe { width: 100%; height: 100%; border: none; }

        .meta {
            margin-top: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .meta h1 { font-size: 42px; margin: 0; font-weight: 900; }

        .info-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .badge-item {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-item.red { background: var(--primary); color: white; }

        @media (max-width: 1100px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 300px; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">კვირიაი მუვის HD</div>
        <div class="ep-list" id="epList"></div>
    </aside>

    <main class="main">
        <div class="video-wrapper">
            <div class="video-box" id="mediaContainer">
                <video id="videoPlayer" controls playsinline></video>
            </div>
        </div>
        
        <div class="meta">
            <div class="info-badge">
                <span class="badge-item red">კვირიაი მუვის HD</span>
                <span class="badge-item">Season პერვი</span>
                <span class="badge-item">ლუკაი</span>
            </div>
            <h1 id="displayTitle">ლუკაის კინო</h1>
        </div>
    </main>

    <script>
        const episodes = [
            { id: 13, url: "https://adjaraneti.xyz/v/rftf4pyl7wuf", type: "iframe" },
            { id: 14, url: "https://adjaraneti.xyz/stream/v7-J8jUdpvFOXXGD_qXw5A/hjkrhuihghfvu/1777179140/3184054/master.m3u8", type: "hls" }
        ];

        const container = document.getElementById('mediaContainer');
        let hls = new Hls();

        function init() {
            const list = document.getElementById('epList');
            episodes.forEach(ep => {
                const card = document.createElement('div');
                card.className = 'ep-card';
                card.innerHTML = `<span class="ep-num">${String(ep.id).padStart(2, '0')}</span> <span class="ep-name">ეპიზოდი ${ep.id}</span>`;
                card.onclick = () => play(ep, card);
                list.appendChild(card);
            });
            
            if(episodes.length > 0) play(episodes[0], document.querySelector('.ep-card'));
        }

        function play(ep, el) {
            document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('displayTitle').innerText = "ეპიზოდი " + ep.id;

            if (ep.type === "iframe") {
                container.innerHTML = `<iframe src="${ep.url}" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video id="videoPlayer" controls playsinline></video>`;
                const video = document.getElementById('videoPlayer');
                if (Hls.isSupported()) {
                    hls.destroy();
                    hls = new Hls();
                    hls.loadSource(ep.url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else {
                    video.src = ep.url;
                    video.play();
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
